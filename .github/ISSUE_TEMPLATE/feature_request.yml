name: Feature request
description: Propose a new capability or product change.
title: "feat: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user problem or deployment scenario should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the smallest useful behavior or API shape.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What simpler approach, existing tool, or non-goal should be considered?
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Agent Handler SPEC
        - pi reference implementation
        - CLI / developer experience
        - HTTP / channels
        - Sessions / storage
        - Build / deploy targets
        - Documentation
        - Other
